# pyproject.toml — Python tooling configuration for home-assistant-culiplan
#
# Coverage: task-1502 (Silver/Gold) — enforces ≥95% coverage gate.
# Mypy:     task-1503 (Gold) + Platinum `strict-typing` (v0.3.1) — strict
#           static typing with py.typed marker and zero blanket suppressions.

[tool.coverage.run]
source = ["custom_components/culiplan"]
omit = [
    # Generated or external files that don't need coverage
    "custom_components/culiplan/__pycache__/*",
]

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = false
exclude_lines = [
    # Standard pragma to skip a line
    "pragma: no cover",
    # Abstract / protocol stubs
    "raise NotImplementedError",
    # Type-checking-only imports
    "if TYPE_CHECKING:",
    # Defensive unreachable guards
    "assert_never",
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
# Platinum rule `strict-typing` (v0.3.1):
#
# The global `disable_error_code` list is empty — `mypy --strict` passes
# against the integration's own code with no blanket suppressions.
# Reduced from 8 globally-disabled error codes in v0.3.0 to 0.
#
# Localized stub gaps are silenced per-line with explanatory comments:
#   - `# type: ignore[untyped-decorator]` on the four python-socketio
#     @sio.event / @sio.on handlers in coordinator.py.
#   - `# type: ignore[attr-defined]` on three HA stub re-exports
#     (HomeAssistantView from .components.http, TodoItemStatus /
#     TodoListEntityFeature from .components.todo, EntityCategory from
#     .helpers.entity) — runtime exports are correct, the stubs lag.
#   - `# type: ignore[override]` on two ConfigFlowResult vs dict[str, Any]
#     return-type drifts on config_flow.async_step_user / async_oauth_create_entry;
#     kept loose for HA 2024.10 floor compatibility.
#   - `# type: ignore[call-arg]` on the DataUpdateCoordinator `config_entry`
#     kwarg in coordinator.py (added in HA 2025.5, gracefully degraded for
#     2024.10 via TypeError fallback).
#   - `# type: ignore[misc,assignment]` on the ImportError fallback in
#     ai/types.py that re-binds `_HomeAssistantError` to Exception.
#
# `warn_return_any` stays disabled because HA's coordinator/entity helpers
# return Any in many places and tightening would force every accessor
# through cast() with no payoff.
warn_return_any = false
disable_error_code = []

[[tool.mypy.overrides]]
# socket.io and its engine.io dependency ship no py.typed or stubs.
module = ["socketio.*", "engineio.*"]
ignore_missing_imports = true
