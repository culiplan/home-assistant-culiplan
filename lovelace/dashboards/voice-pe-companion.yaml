# ============================================================
# Culiplan — Voice PE Companion Dashboard
# Layout: Wall-mounted display or Voice PE companion screen
#         (typically 7–10" landscape, always-on)
#
# Install:
#   Home Assistant → Dashboards → Add Dashboard → Take Control
#   Paste this file's contents into the RAW configuration editor.
#
# Designed for voice-first use:
#   - Prominent meal summary (large text, high contrast)
#   - Microphone / Assist button at top for quick voice access
#   - Cooking Mode card: active timers + step state while cooking
#   - Shopping list visible at a glance (tick-off from couch)
#   - Pantry expiry warnings without needing to tap
#
# Voice commands that work with this layout:
#   "What's for dinner tonight?"          → sensor.culiplan_meals_planned_this_week
#   "Add milk to the shopping list"       → todo.culiplan_shopping_list
#   "What's expiring in the pantry?"      → sensor.culiplan_expiring_pantry
#   "Next step"                           → advances cooking session step
#   "Start cooking [recipe name]"         → starts a cooking session
# ============================================================

title: "Voice Companion"
icon: mdi:microphone
path: culiplan-voice
theme: default

views:
  - title: "Voice Companion"
    path: voice
    icon: mdi:microphone
    type: panel

    cards:
      - type: grid
        columns: 2
        square: false
        cards:

          # ── Left — Meal plan + voice shortcut ────────────────
          - type: vertical-stack
            cards:

              # Assist voice button — top of screen for tap-to-talk
              - type: assist_satellite
                # Requires HA 2024.5+ with an active Assist satellite
                # (e.g. ESPHome microphone, Wyoming satellite, etc.)
                # Remove this card if no satellite is configured.

              # Today's meals — large font, high-contrast for wall display
              - type: custom:culiplan-kitchen-dashboard
                entity: calendar.culiplan_meal_plan
                shopping_entity: todo.culiplan_shopping_list
                title: "Today's plan"
                show_shopping: false
                max_meals: 3

              # Meal plan week view
              - type: calendar
                title: "This week"
                entities:
                  - entity: calendar.culiplan_meal_plan
                    name: "Meal plan"
                initial_view: listWeek

          # ── Right — Pantry + shopping list ───────────────────
          - type: vertical-stack
            cards:

              # Sensor row — at a glance without tapping
              - type: glance
                title: "Kitchen status"
                show_name: true
                show_icon: true
                show_state: true
                columns: 3
                entities:
                  - entity: sensor.culiplan_meals_planned_this_week
                    name: "Meals this week"
                    icon: mdi:food-variant
                  - entity: sensor.culiplan_shopping_items
                    name: "Shopping items"
                    icon: mdi:cart
                  - entity: sensor.culiplan_expiring_pantry
                    name: "Expiring soon"
                    icon: mdi:clock-alert-outline

              # Pantry — expiry-focused for voice PE companion
              - type: custom:culiplan-pantry-tracker
                entity: sensor.culiplan_expiring_pantry
                shopping_entity: todo.culiplan_shopping_list
                title: "Pantry watch"
                max_items: 8

              # Shopping list — voice add-item is the primary interaction
              - type: todo-list
                title: "Shopping list"
                entity: todo.culiplan_shopping_list

              # Cooking Mode card — Phase 3 (task-1383 + task-1396)
              # Voice PE companion: timers + steps always visible while cooking.
              # Falls back gracefully to "Start cooking from a recipe" CTA.
              # TODO: sensor.culiplan_active_cooking_session does not exist yet.
              - type: custom:culiplan-cooking-mode
                title: "Cooking"
                show_step_numbers: true
                max_timers: 3
