# ============================================================
# Culiplan — Kitchen Tablet Dashboard
# Layout: 10" landscape tablet (1024 x 768+ viewport)
#
# Install:
#   Home Assistant → Dashboards → Add Dashboard → Take Control
#   Paste this file's contents into the RAW configuration editor.
#
# Requirements:
#   - Culiplan integration installed and authenticated
#   - HACS integration (for card resource loading) OR
#     manually add lovelace resources (see README)
#
# Custom cards used:
#   - culiplan-kitchen-dashboard (today's plan)
#   - culiplan-pantry-tracker    (pantry with expiry tiles)
#   - culiplan-cooking-mode      (step-by-step cooking — Phase 3)
# ============================================================

title: "Kitchen"
icon: mdi:chef-hat
path: culiplan-kitchen
theme: default

views:
  - title: "Kitchen"
    path: kitchen
    icon: mdi:chef-hat
    type: panel

    cards:
      - type: grid
        columns: 3
        square: false
        cards:

          # ── Left column — Today's plan ────────────────────────
          - type: vertical-stack
            cards:
              - type: custom:culiplan-kitchen-dashboard
                entity: calendar.culiplan_meal_plan
                shopping_entity: todo.culiplan_shopping_list
                title: "What's for Dinner?"
                show_shopping: true
                max_meals: 3

              # Summary sensors below the kitchen card
              - type: glance
                title: "Today at a glance"
                show_name: true
                show_icon: true
                show_state: true
                columns: 3
                entities:
                  - entity: sensor.culiplan_meals_planned_this_week
                    name: "Meals this week"
                    icon: mdi:food-variant
                  - entity: sensor.culiplan_shopping_items
                    name: "Shopping items"
                    icon: mdi:cart
                  - entity: sensor.culiplan_expiring_pantry
                    name: "Expiring soon"
                    icon: mdi:clock-alert-outline

          # ── Centre column — Calendar + Cooking Mode ──────────
          - type: vertical-stack
            cards:
              - type: calendar
                title: "Meal plan"
                entities:
                  - entity: calendar.culiplan_meal_plan
                    name: "Meal plan"
                initial_view: dayGridWeek

              # Cooking Mode card — Phase 3 (task-1383 + task-1396)
              # Shows active cooking session: step list, timers, voice shortcut.
              # Gracefully shows "Start cooking from a recipe" when idle.
              # TODO: sensor.culiplan_active_cooking_session does not exist yet —
              # coordinator stores active_cooking_session in data but no sensor
              # entity is exposed.  Card still renders (falls back to idle state).
              - type: custom:culiplan-cooking-mode
                title: "Cooking"
                show_step_numbers: true
                max_timers: 3

          # ── Right column — Pantry ─────────────────────────────
          - type: vertical-stack
            cards:
              - type: custom:culiplan-pantry-tracker
                entity: sensor.culiplan_expiring_pantry
                shopping_entity: todo.culiplan_shopping_list
                title: "Pantry"
                max_items: 12

              - type: todo-list
                title: "Shopping list"
                entity: todo.culiplan_shopping_list
