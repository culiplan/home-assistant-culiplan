blueprint:
  name: "Culiplan: Daily pantry expiry reminder"
  description: >
    Every morning at the configured time, this automation checks whether any
    pantry items expire within the next 48 hours. If so, it sends a push
    notification prompting you to check the Culiplan app.

    Uses the `binary_sensor.culiplan_pantry_has_expiring` entity that ships
    with the Culiplan integration.

    **Prerequisites**: Culiplan integration installed and connected.
    **Free tier**: Yes — no Culiplan Premium required.
  domain: automation
  source_url: https://github.com/Vincent91s/home-assistant-culiplan/blob/main/blueprints/automation/culiplan/pantry-expiry-notify.yaml
  input:
    reminder_time:
      name: Daily reminder time
      description: Time at which the daily expiry check fires.
      default: "09:00:00"
      selector:
        time: {}
    notify_target:
      name: Notification target
      description: >
        Service to call for the push notification, e.g. `notify.mobile_app_phone`.
      selector:
        text: {}
    notify_title:
      name: Notification title
      default: "Culiplan — Items expiring soon"
      selector:
        text: {}
    notify_message:
      name: Notification message
      description: >
        Message sent when expiring items are found. The `{{ expiring_count }}`
        variable is available for the number of expiring items.
      default: "{{ expiring_count }} pantry item(s) expire within 48 hours. Check your Culiplan app."
      selector:
        text: {}

variables:
  expiring_count: "{{ state_attr('binary_sensor.culiplan_pantry_has_expiring', 'expiring_item_ids') | default([]) | count }}"

trigger:
  - platform: time
    at: !input reminder_time

condition:
  - condition: state
    entity_id: binary_sensor.culiplan_pantry_has_expiring
    state: "on"

action:
  - service: !input notify_target
    data:
      title: !input notify_title
      message: !input notify_message
      data:
        url: "https://culiplan.com/pantry"
        push:
          category: "culiplan_pantry_expiry"

mode: single
