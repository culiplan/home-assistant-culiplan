blueprint:
  name: "Culiplan: Add to shopping list when pantry item depleted"
  description: >
    When Culiplan emits a `pantry.item.depleted` event (stock crossed below
    the configured threshold), this automation appends the item to your active
    shopping list and optionally sends a push notification to the household.

    The threshold is configured per-item in the Culiplan app. This blueprint
    wires the event to your preferred notification target.

    **Prerequisites**: Culiplan integration installed and connected.
    **Free tier**: Yes — no Culiplan Premium required.
  domain: automation
  source_url: https://github.com/culiplan/home-assistant-culiplan/blob/main/blueprints/automation/culiplan/pantry-zero-shopping.yaml
  input:
    notify_target:
      name: Notification target (optional)
      description: >
        Service to call for the push notification, e.g. `notify.mobile_app_phone`.
        Leave empty to skip the notification.
      default: ""
      selector:
        text: {}
    notify_title:
      name: Notification title
      description: Title of the push notification.
      default: "Culiplan — Pantry low"
      selector:
        text: {}
    notify_message:
      name: Notification message
      description: >
        Message body. You may use `{{ trigger.event.data.id }}` to include the
        item ID (detail available via the Culiplan app).
      default: "A pantry item is running low. Check your Culiplan app."
      selector:
        text: {}

trigger:
  - platform: event
    event_type: culiplan_pantry_depleted  # fired by Culiplan backend via HA event bus

condition: []

action:
  - if:
      - condition: template
        value_template: "{{ notify_target | trim != '' }}"
    then:
      - service: "{{ notify_target }}"
        data:
          title: !input notify_title
          message: !input notify_message
          data:
            url: "https://culiplan.com/pantry"
            push:
              category: "culiplan_pantry_low"

mode: queued
max: 10
