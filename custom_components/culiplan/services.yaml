# Flavorplan HA service descriptions (Phase 2 — tasks 1376, 1378, 1379; Phase 3 — task 1400)
# Used by the Home Assistant UI to show service descriptions and field hints.

pantry_decrement:
  name: Decrement pantry item
  description: >
    Decrements stock for the pantry item identified by the given barcode.
    Uses FEFO (First Expired First Out) logic. If the item is not found, a
    Repairs issue is created prompting you to add it in Flavorplan.
    Free tier — no Flavorplan Premium required.
  fields:
    barcode:
      name: Barcode
      description: >
        Product barcode (EAN-8, EAN-13, UPC-A, or UPC-E). Hyphens and spaces
        are stripped automatically.
      required: true
      selector:
        text: {}
    qty:
      name: Quantity
      description: How many units to remove from stock. Defaults to 1.
      required: false
      default: 1
      selector:
        number:
          min: 0.1
          max: 100
          step: 0.1
          mode: box

pantry_expiring_items:
  name: Get expiring pantry items
  description: >
    Fetches the list of pantry items expiring within the given window and fires
    a `culiplan_pantry_expiring_result` HA event with the item IDs.
    Free tier — no Flavorplan Premium required.
  fields:
    window_hours:
      name: Expiry window (hours)
      description: >
        How many hours ahead to check for expiring items. Defaults to 48.
      required: false
      default: 48
      selector:
        number:
          min: 1
          max: 720
          step: 1
          unit_of_measurement: h
          mode: box

scale_tonight_servings:
  name: Scale tonight's servings
  description: >
    Records the number of household members currently home and updates tonight's
    meal plan so Flavorplan can display ingredient quantities scaled to the
    present count.
    **Requires Flavorplan Premium.** Free users will see a Repairs upsell issue.
  fields:
    present_count:
      name: Present count
      description: Number of household members currently home.
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: box
    plan_date:
      name: Plan date (optional)
      description: >
        Date to scale servings for (YYYY-MM-DD). Defaults to today.
      required: false
      selector:
        date: {}

generate_blueprint:
  name: Generate automation blueprint
  description: >
    Generates a Home Assistant automation blueprint YAML from a natural language
    description using Flavorplan AI.

    **Cloud AI mode**: Flavorplan generates the YAML server-side.
    **Requires Flavorplan Premium** for Cloud AI mode; free for BYOK / Local AI.

    **BYOK / Local AI mode**: The backend returns a prompt envelope only; your
    locally-configured AI model generates the YAML. Your API key never leaves
    Home Assistant.

    On success fires the ``culiplan_blueprint_generated`` event with the YAML and
    validation result. If ``install`` is true and the blueprint passes validation,
    the YAML is written to ``config/blueprints/automation/culiplan/`` and HA
    blueprints are reloaded automatically.
  fields:
    prompt:
      name: Prompt
      description: >
        Natural language description of the automation you want to create.
        For example: "Notify me at 7am with today's meal plan".
      required: true
      selector:
        text:
          multiline: true
    available_entities:
      name: Available entities (optional)
      description: >
        List of entity IDs available in your Home Assistant install.
        When provided, the AI can reference specific entities in the blueprint.
        Maximum 100 entities.
      required: false
      selector:
        object: {}
    install:
      name: Install blueprint
      description: >
        When true, write the generated blueprint YAML to
        config/blueprints/automation/culiplan/ and reload HA blueprints.
        Only takes effect when the blueprint passes validation.
        Defaults to false.
      required: false
      default: false
      selector:
        boolean: {}
