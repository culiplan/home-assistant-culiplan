name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC (task-1370 AC#4)
    - cron: "0 2 * * *"

jobs:
  pytest:
    name: pytest — HA ${{ matrix.ha-version }} (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry pins the HA version and the Python version it requires.
        # 2026.6.0 was the user-facing breakage point in 2026-06 (OptionsFlow
        # ctor removal + openai 1.77 wheel gap); keep it in the matrix so we
        # catch deprecations on HA latest before users hit them on HAOS.
        include:
          - ha-version: "2024.10.0"
            python-version: "3.12"
          - ha-version: "2025.4.0"
            python-version: "3.12"
          - ha-version: "2026.6.0"
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          pip install \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component \
            pytest \
            pytest-asyncio \
            pytest-cov \
            aiohttp \
            "python-socketio>=5.12.0" \
            "PyYAML>=6.0.2"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=custom_components/culiplan \
            --cov-report=term-missing \
            --cov-fail-under=95

      - name: Upload coverage report
        if: matrix.ha-version == '2026.6.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
