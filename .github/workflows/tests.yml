name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC (task-1370 AC#4)
    - cron: "0 2 * * *"

jobs:
  pytest:
    name: pytest — HA ${{ matrix.ha-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ha-version:
          # Current stable + previous stable (6-month window from task-1364 plan)
          - "2025.4.0"
          - "2024.10.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component \
            pytest \
            pytest-asyncio \
            aiohttp \
            python-socketio==5.12.0 \
            PyYAML==6.0.2

      - name: Run tests
        run: pytest tests/ -v --tb=short
