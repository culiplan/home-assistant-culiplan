name: Tests

# Re-enabled 2026-06-05 after the pytest-homeassistant-custom-component fixture
# drift was repaired (see tests/conftest.py header for the root-cause writeup).
# The fix is a one-line pyproject.toml change (`asyncio_mode = "auto"`) that
# lets the upstream async `hass` fixture resolve when consumed by sync
# fixtures like `enable_custom_integrations`. All three matrix lanes now pass
# fixture collection.
#
# Coverage gate is the Platinum 95% floor (restored in v0.13.0 after the
# central _BROKEN_TEST_IDS skip list was driven to zero).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC (task-1370 AC#4)
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  pytest:
    name: pytest — HA ${{ matrix.ha-version }} (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry pins the HA version and the Python version it requires.
        # 2026.6.0 was the user-facing breakage point in 2026-06 (OptionsFlow
        # ctor removal + openai 1.77 wheel gap); keep it in the matrix so we
        # catch deprecations on HA latest before users hit them on HAOS.
        # HA 2025.2 onward requires Python ≥3.13; HA 2026.3 onward requires
        # ≥3.14. Each lane must pin the right Python for its HA version or
        # pip can't resolve the homeassistant pin. 2025.1.4 is the last
        # HA release on Python 3.12 (the prior 2025.4 lane was unresolvable).
        include:
          - ha-version: "2024.10.0"
            python-version: "3.12"
          - ha-version: "2025.1.4"
            python-version: "3.12"
          - ha-version: "2026.6.0"
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # `openai`, `anthropic`, `google-genai` are integration runtime
        # requirements (manifest.json) — tests import them through the
        # dispatcher modules even when patched, so they have to be on the
        # install list explicitly.
        run: |
          pip install \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component \
            pytest \
            pytest-asyncio \
            pytest-cov \
            aiohttp \
            "python-socketio>=5.12.0" \
            "PyYAML>=6.0.2" \
            "openai>=1.77.0" \
            "anthropic>=0.49.0"
          # google-genai installs are intentionally skipped: every recent
          # 1.x release depends on httpx>=0.28.1, which conflicts with
          # HA 2024.10/2025.1's httpx<0.28 pin. The dispatcher imports it
          # lazily inside its __init__ and every test that touches it
          # patches the SDK at the upstream module path. Install it only
          # on the HA 2026.6 lane where the httpx pin allows it.
          if [ "${{ matrix.ha-version }}" = "2026.6.0" ]; then
            pip install "google-genai>=1.12.0"
          fi

      - name: Run tests with coverage
        # 95% Platinum gate. asyncio_mode lives in pyproject.toml so it
        # applies uniformly to local `pytest` runs and CI.
        run: |
          pytest tests/ -v --tb=short \
            --cov=custom_components/culiplan \
            --cov-report=term-missing \
            --cov-fail-under=95

      - name: Upload coverage report
        if: matrix.ha-version == '2026.6.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
